<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何嘉庆牛逼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow: hidden;
        }

        /* 背景粒子动画 */
        .bg-particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .bg-particles span {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 215, 0, 0.4);
            border-radius: 50%;
            animation: floatUp 8s infinite;
        }

        .bg-particles span:nth-child(1) { left: 10%; animation-delay: 0s; }
        .bg-particles span:nth-child(2) { left: 20%; animation-delay: 1.2s; width: 8px; height: 8px; }
        .bg-particles span:nth-child(3) { left: 35%; animation-delay: 2.5s; }
        .bg-particles span:nth-child(4) { left: 50%; animation-delay: 0.8s; width: 10px; height: 10px; }
        .bg-particles span:nth-child(5) { left: 65%; animation-delay: 3.2s; }
        .bg-particles span:nth-child(6) { left: 75%; animation-delay: 1.8s; width: 5px; height: 5px; }
        .bg-particles span:nth-child(7) { left: 85%; animation-delay: 4s; }
        .bg-particles span:nth-child(8) { left: 45%; animation-delay: 2.2s; width: 7px; height: 7px; }
        .bg-particles span:nth-child(9) { left: 95%; animation-delay: 0.5s; }
        .bg-particles span:nth-child(10) { left: 5%; animation-delay: 3.8s; width: 9px; height: 9px; }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
        }

        /* 光晕背景 */
        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        /* 主标题 - 何嘉庆牛逼 */
        .main-text {
            font-size: 100px;
            font-weight: 900;
            color: transparent;
            background: linear-gradient(135deg, #f7971e, #ffd200, #f7971e);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: goldShine 3s ease-in-out infinite;
            text-shadow: none;
            letter-spacing: 12px;
            line-height: 1.3;
            position: relative;
        }

        @keyframes goldShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* 副标题装饰 */
        .subtitle {
            margin-top: 20px;
            font-size: 24px;
            color: rgba(255, 215, 0, 0.5);
            letter-spacing: 20px;
            font-weight: 300;
        }

        /* 底部闪烁的小字 */
        .footer-text {
            margin-top: 60px;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 6px;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        /* 装饰边框 */
        .border-frame {
            position: relative;
            padding: 60px 80px;
            border: 2px solid rgba(255, 215, 0, 0.15);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            box-shadow: 
                0 0 40px rgba(255, 215, 0, 0.05),
                inset 0 0 40px rgba(255, 215, 0, 0.03);
        }

        .border-frame::before {
            content: '★';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            color: #ffd700;
            background: #24243e;
            padding: 0 20px;
        }

        /* 烟花效果 */
        .firework {
            position: fixed;
            pointer-events: none;
            z-index: 0;
        }

        @media (max-width: 768px) {
            .main-text { font-size: 48px; letter-spacing: 6px; }
            .border-frame { padding: 30px 20px; }
            .subtitle { font-size: 16px; letter-spacing: 10px; }
        }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <div class="bg-particles">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- 主容器 -->
    <div class="container">
        <div class="glow"></div>
        <div class="border-frame">
            <div class="main-text">何嘉庆牛逼</div>
            <div class="subtitle">✦ 永远的神 ✦</div>
            <div class="footer-text">★ 光芒万丈 · 无人能挡 ★</div>
        </div>
    </div>
</body>
</html>
